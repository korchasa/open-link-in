name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          swift --version
          swift format --version

      - name: Verify (build + comment-scan + format + tests)
        run: ./build.sh check
