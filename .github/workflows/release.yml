name: Release to App Store

# Triggered by pushing a version tag (e.g. v1.0.0) or run manually.
# Requires the repository secrets configured per
# documents/tasks/2026/06/appstore-cicd-setup.md.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  appstore:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Import signing certificates
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          INSTALLER_CERT_P12_BASE64: ${{ secrets.INSTALLER_CERT_P12_BASE64 }}
          INSTALLER_CERT_PASSWORD: ${{ secrets.INSTALLER_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          printf '%s' "$DIST_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          printf '%s' "$INSTALLER_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/dist.p12" -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security import "$RUNNER_TEMP/installer.p12" -P "$INSTALLER_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/dist.p12" "$RUNNER_TEMP/installer.p12"

      - name: Install provisioning profile
        env:
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$PROVISION_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/app.provisionprofile"

      - name: Build sandboxed App Store package
        env:
          MAS_APP_IDENTITY: ${{ secrets.MAS_APP_IDENTITY }}
        run: |
          set -euo pipefail
          export MAS_PROVISION_PROFILE="$RUNNER_TEMP/app.provisionprofile"
          export MAS_BUILD_NUMBER="$GITHUB_RUN_NUMBER"
          ./build.sh appstore

      - name: Sign installer package
        env:
          MAS_INSTALLER_IDENTITY: ${{ secrets.MAS_INSTALLER_IDENTITY }}
        run: |
          set -euo pipefail
          productbuild --component SmartLinksOpener-AppStore.app /Applications \
            --sign "$MAS_INSTALLER_IDENTITY" SmartLinksOpener.pkg

      - name: Upload to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/private_keys"
          printf '%s' "$ASC_KEY_P8_BASE64" | base64 --decode > "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          xcrun altool --upload-app -f SmartLinksOpener.pkg -t macos \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
          rm -f "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
